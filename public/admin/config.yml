backend:
  name: github
  repo: latentoac/web-corporativa  # Tu repositorio de GitHub
  branch: main
  base_url: https://latentoac.netlify.app  # Tu dominio en producción
  auth_endpoint: /api/auth                  # Apunta a tu Netlify Function

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "blog"
    label: "Blog"
    folder: "src/content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Fecha", name: "date", widget: "datetime" }
      - { label: "Imagen destacada", name: "image", widget: "image", required: false }
      - { label: "Contenido", name: "body", widget: "markdown" }

  - name: "talleres"
    label: "Talleres"
    folder: "src/content/talleres"
    create: true
    fields:
      - { label: "Nombre del taller", name: "title", widget: "string" }
      - { label: "Descripción", name: "description", widget: "text" }
      - { label: "Fecha", name: "date", widget: "datetime" }
      - { label: "Imagen", name: "image", widget: "image", required: false }
      - label: "URL de inscripción"
        name: "inscription_url"
        widget: "string"
        required: false
        hint: "Enlace al formulario para inscribirse al taller"
        pattern: ['^https?://.+', "Debe ser una URL válida (https://...)"]
      - { label: "Contenido", name: "body", widget: "markdown" }