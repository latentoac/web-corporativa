backend:
  name: git-gateway
  branch: main # Asegúrate de que coincide con tu rama principal

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "blog"
    label: "Blog"
    folder: "src/content/blog"
    create: true
    extension: "md" # Obliga a crear archivos .md
    format: "frontmatter" # Asegura que use YAML arriba y Markdown abajo
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Fecha", name: "date", widget: "datetime" }
      - { label: "Imagen destacada", name: "image", widget: "image", required: false }
      - { label: "Cuerpo", name: "body", widget: "markdown" }

  - name: "talleres"
    label: "Talleres"
    folder: "src/content/talleres"
    create: true
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Nombre del taller", name: "title", widget: "string" }
      - { label: "Descripción", name: "description", widget: "text" }
      - { label: "Fecha", name: "date", widget: "datetime" }
      - { label: "Imagen", name: "image", widget: "image", required: false }
      - label: "URL de inscripción"
        name: "inscription_url"
        widget: "string"
        required: false
        hint: "Enlace al formulario para inscribirse al taller"
        pattern: ['^https?://.+', "Debe ser una URL válida"]
      - { label: "Cuerpo", name: "body", widget: "markdown" }