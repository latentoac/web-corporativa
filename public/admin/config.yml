backend:
  name: github
  repo: latentoac/web-corporativa
  branch: main

locale: 'es'

logo:
  src: /admin/latento-cms-logo.png
  show_in_header: true

media_folder: "src/assets/uploads"
public_folder: "/src/assets/uploads"

media_library:
  name: cloudinary
  output_filename_only: false
  use_secure_url: true
  use_transformations: false
  config:
    cloud_name: dmvpxkp5m
    api_key: 829335741176169
    multiple: false
    default_transformations:
      - - fetch_format: auto
          quality: auto

collections:

  - name: "blog"
    label: "Blog"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Fecha", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false, required: false }
      - label: "Imagen destacada"
        name: "image"
        widget: "image"
        required: false
        media_library:
          config:
            default_transformations:
              - - fetch_format: auto
                  quality: auto
                  width: 1600
                  crop: limit
      - label: "Etiquetas"
        name: "tags"
        widget: "list"
        required: false
        field: { label: "Etiqueta", name: "tag", widget: "string" }
      - { label: "Publicado", name: "publicado", widget: "boolean", default: true }
      - { label: "Contenido", name: "body", widget: "markdown", required: false }

  - name: "talleres"
    label: "Talleres"
    folder: "src/content/talleres"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Descripción", name: "description", widget: "text", required: false }
      - { label: "Fecha", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false, required: false }
      - { label: "Dirigido a", name: "dirigido_a", widget: "string", required: false, hint: "Ej: Niños de 8 a 12 años" }
      - { label: "Hora de inicio", name: "hora_inicio", widget: "string", required: false, hint: "Formato HH:MM, ej: 17:00" }
      - { label: "Hora de fin", name: "hora_fin", widget: "string", required: false, hint: "Formato HH:MM, ej: 19:00" }
      - { label: "Precio (€)", name: "precio", widget: "number", required: false, value_type: "float", min: 0 }
      - label: "Imagen destacada"
        name: "image"
        widget: "image"
        required: false
        media_library:
          config:
            default_transformations:
              - - fetch_format: auto
                  quality: auto
                  width: 1600
                  crop: limit
      - label: "Modalidad"
        name: "modalidad"
        widget: "select"
        multiple: true
        min: 1
        options:
          - { label: "Talleres en Santiago", value: "santiago" }
          - { label: "Talleres en A Coruña", value: "coruna" }
          - { label: "Formación Online", value: "online" }
      - { label: "URL de inscripción", name: "inscription_url", widget: "string", required: false, hint: "URL completa, ej: https://tally.so/r/xxxxx" }
      - { label: "Fecha límite de inscripción", name: "fecha_limite_inscripcion", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false, required: false, hint: "Fecha límite para inscribirse en el taller" }
      - { label: "Publicado", name: "publicado", widget: "boolean", default: true }
      - { label: "Contenido", name: "body", widget: "markdown", required: false }
